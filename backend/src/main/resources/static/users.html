<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <!-- Bootstrap CSS -->
    <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/users.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>用户管理</h1>
        </div>

        <div class="toolbar">
            <div class="search-form">
                <input type="text" id="searchUserName" placeholder="用户名">
                <input type="text" id="searchMobile" placeholder="手机号">
                <input type="text" id="searchEmail" placeholder="邮箱">
                <input type="text" id="searchNickName" placeholder="昵称">
                <button class="btn btn-primary" onclick="searchUsers()">搜索</button>
                <button class="btn" onclick="resetSearch()">重置</button>
            </div>
            <button class="btn btn-success" onclick="showCreateModal()">新增用户</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>昵称</th>
                        <th>姓名</th>
                        <th>手机号</th>
                        <th>邮箱</th>
                        <th>性别</th>
                        <th>备注</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr>
                        <td colspan="10" class="loading">加载中...</td>
                    </tr>
                </tbody>
            </table>

            <div class="pagination" id="pagination">
                <!-- Pagination will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增用户</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label for="userName">用户名 *</label>
                    <input type="text" id="userName" required>
                </div>
                <div class="form-group" id="passwordGroup">
                    <label for="password">密码 *</label>
                    <input type="password" id="password">
                </div>
                <div class="form-group">
                    <label for="nickName">昵称</label>
                    <input type="text" id="nickName">
                </div>
                <div class="form-group">
                    <label for="fullName">姓名</label>
                    <input type="text" id="fullName">
                </div>
                <div class="form-group">
                    <label for="mobile">手机号</label>
                    <input type="text" id="mobile">
                </div>
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email">
                </div>
                <div class="form-group">
                    <label for="sex">性别</label>
                    <select id="sex">
                        <option value="">请选择</option>
                        <option value="0">女</option>
                        <option value="1">男</option>
                        <option value="2">未知</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="birthday">生日</label>
                    <input type="date" id="birthday">
                </div>
                <div class="form-group">
                    <label for="remark">备注</label>
                    <textarea id="remark"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="/js/users.js"></script>
</body>
</html>
