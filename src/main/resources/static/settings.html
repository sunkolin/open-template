<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人设置 - 邮件推送系统</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/settings.css" rel="stylesheet">
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="top-navbar">
        <a class="navbar-brand" href="/index.html">📧 邮件推送系统</a>
        <div class="user-info">
            <span id="userName"><i class="bi bi-person-circle"></i> 加载中...</span>
            <button class="btn-logout" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i> 退出登录
            </button>
        </div>
    </div>

    <!-- 左侧菜单栏 -->
    <div class="sidebar">
        <ul class="sidebar-menu">
            <li>
                <a href="/index.html">
                    <i class="bi bi-house-door"></i>
                    <span>首页</span>
                </a>
            </li>
            <li>
                <a href="#mail-push">
                    <i class="bi bi-send"></i>
                    <span>邮件推送</span>
                </a>
            </li>
            <li>
                <a href="#sender-manage">
                    <i class="bi bi-envelope"></i>
                    <span>发送邮箱管理</span>
                </a>
            </li>
            <li>
                <a href="#receiver-manage">
                    <i class="bi bi-inbox"></i>
                    <span>接收邮箱管理</span>
                </a>
            </li>
            <li>
                <a href="/users.html">
                    <i class="bi bi-people"></i>
                    <span>用户管理</span>
                </a>
            </li>
            <li>
                <a href="/settings.html" class="active">
                    <i class="bi bi-gear"></i>
                    <span>个人设置</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="content-wrapper">
            <h2 class="page-title"><i class="bi bi-gear"></i> 个人设置</h2>

            <!-- 提示信息 -->
            <div id="successAlert" class="alert alert-success" role="alert"></div>
            <div id="errorAlert" class="alert alert-danger" role="alert"></div>

            <!-- 基本信息设置 -->
            <div class="settings-section">
                <h3 class="section-title"><i class="bi bi-person"></i> 基本信息</h3>
                <form id="profileForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" disabled>
                        <div class="info-text">用户名不可修改</div>
                    </div>

                    <div class="mb-3">
                        <label for="nickName" class="form-label">昵称</label>
                        <input type="text" class="form-control" id="nickName" placeholder="请输入昵称" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="email" placeholder="请输入邮箱" required>
                    </div>

                    <button type="submit" class="btn btn-save">
                        <i class="bi bi-check-circle"></i> 保存修改
                    </button>
                </form>
            </div>

            <hr style="margin: 40px 0;">

            <!-- 密码修改 -->
            <div class="settings-section">
                <h3 class="section-title"><i class="bi bi-lock"></i> 修改密码</h3>
                <form id="passwordForm">
                    <div class="mb-3">
                        <label for="oldPassword" class="form-label">当前密码</label>
                        <input type="password" class="form-control" id="oldPassword" placeholder="请输入当前密码" required>
                    </div>

                    <div class="mb-3">
                        <label for="newPassword" class="form-label">新密码</label>
                        <input type="password" class="form-control" id="newPassword" placeholder="请输入新密码（至少6位）" required minlength="6">
                        <div class="info-text">密码长度不能少于6位</div>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">确认新密码</label>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="请再次输入新密码" required>
                    </div>

                    <button type="submit" class="btn btn-save">
                        <i class="bi bi-key"></i> 修改密码
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="/js/settings.js"></script>
</body>
</html>
