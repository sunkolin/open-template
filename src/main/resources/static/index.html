 。<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮件推送系统 - 主页</title>
    <!-- Bootstrap CSS -->
    <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="/vendor/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/index.css" rel="stylesheet">
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="top-navbar">
        <a class="navbar-brand" href="#">📧 邮件推送系统</a>
        <div class="user-info">
            <span id="userName"><i class="bi bi-person-circle"></i> 加载中...</span>
            <button class="btn-logout" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i> 退出登录
            </button>
        </div>
    </div>

    <!-- 左侧菜单栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0zM4.5 7.5a.5.5 0 0 1 0-1h5.793L8.146 4.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 7.5H4.5z"/>
                </svg>
            </div>
            <span class="logo-text">邮件推送系统</span>
        </div>
        <ul class="sidebar-menu">
            <li>
                <a href="/index.html" class="active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L8 2.207l6.646 6.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.707 1.5Z"/>
                        <path d="m8 3.293 6 6V13.5a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 2 13.5V9.293l6-6Z"/>
                    </svg>
                    <span>首页</span>
                </a>
            </li>
            <li>
                <a href="#user-manage" id="menu-user-manage">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                        <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
                    </svg>
                    <span>用户管理</span>
                </a>
            </li>
            <li>
                <a href="#settings" id="menu-settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
                        <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.421 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.421-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/>
                    </svg>
                    <span>个人设置</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 首页视图 -->
        <div id="view-home" class="section-view active">
            <div class="content-wrapper">
                <h2 class="page-title">欢迎使用邮件推送系统</h2>
                
                <div class="welcome-section">
                    <h1>👋 欢迎回来！</h1>
                    <p>这是一个功能强大的邮件批量推送管理平台，帮助您高效管理邮件发送任务</p>
                </div>

                <div class="feature-grid">
                    <div class="feature-card" onclick="switchToSection('user-manage')">
                        <i class="bi bi-people"></i>
                        <h3>用户管理</h3>
                        <p>管理系统用户和权限设置</p>
                    </div>
                    <div class="feature-card" onclick="alert('功能开发中...')">
                        <i class="bi bi-bar-chart"></i>
                        <h3>数据统计</h3>
                        <p>查看邮件发送统计和分析报告</p>
                    </div>
                    <div class="feature-card" onclick="alert('功能开发中...')">
                        <i class="bi bi-gear"></i>
                        <h3>系统设置</h3>
                        <p>配置系统参数和个性化选项</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 用户管理视图 -->
        <div id="view-user-manage" class="section-view">
            <div class="content-wrapper">
                <h2 class="page-title"><i class="bi bi-people"></i> 用户管理</h2>

                <div class="user-toolbar">
                    <div class="search-form">
                        <input type="text" id="searchNickName" placeholder="昵称">
                        <input type="text" id="searchEmail" placeholder="邮箱">
                        <input type="text" id="searchMobile" placeholder="手机号">
                        <button class="btn btn-primary" onclick="searchUsers()">搜索</button>
                        <button class="btn" onclick="resetSearch()">重置</button>
                    </div>
                    <button class="btn btn-success" onclick="showCreateModal()">新增用户</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>昵称</th>
                                <th>邮箱</th>
                                <th>手机号</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <tr>
                                <td colspan="6" class="loading">加载中...</td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="pagination" id="pagination">
                        <!-- Pagination will be rendered here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 个人设置视图 -->
        <div id="view-settings" class="section-view">
            <div class="content-wrapper">
                <h2 class="page-title"><i class="bi bi-gear"></i> 个人设置</h2>

                <div id="settingsSuccessAlert" class="alert alert-success" style="display:none; margin-bottom: 20px;"></div>
                <div id="settingsErrorAlert" class="alert alert-danger" style="display:none; margin-bottom: 20px;"></div>

                <!-- 基本信息设置 -->
                <div class="settings-section" style="margin-bottom: 40px;">
                    <h3 style="font-size: 18px; color: #34495e; margin-bottom: 20px; font-weight: 600;"><i class="bi bi-person"></i> 基本信息</h3>
                    <form id="profileForm">
                        <div class="mb-3">
                            <label for="settingsNickName" class="form-label" style="font-weight: 500; color: #555;">昵称</label>
                            <input type="text" class="form-control" id="settingsNickName" placeholder="请输入昵称" required style="border-radius: 8px; padding: 10px 15px; border: 2px solid #e1e5e9;">
                        </div>

                        <div class="mb-3">
                            <label for="settingsEmail" class="form-label" style="font-weight: 500; color: #555;">邮箱</label>
                            <input type="email" class="form-control" id="settingsEmail" placeholder="请输入邮箱" required style="border-radius: 8px; padding: 10px 15px; border: 2px solid #e1e5e9;">
                        </div>

                        <div class="mb-3">
                            <label for="settingsMobile" class="form-label" style="font-weight: 500; color: #555;">手机号</label>
                            <input type="text" class="form-control" id="settingsMobile" placeholder="请输入手机号" style="border-radius: 8px; padding: 10px 15px; border: 2px solid #e1e5e9;">
                        </div>

                        <button type="submit" class="btn btn-primary" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 8px; padding: 10px 30px; color: white; font-weight: 600;">
                            <i class="bi bi-check-circle"></i> 保存修改
                        </button>
                    </form>
                </div>

                <hr style="margin: 40px 0;">

                <!-- 密码修改 -->
                <div class="settings-section">
                    <h3 style="font-size: 18px; color: #34495e; margin-bottom: 20px; font-weight: 600;"><i class="bi bi-lock"></i> 修改密码</h3>
                    <form id="passwordForm">
                        <div class="mb-3">
                            <label for="oldPassword" class="form-label" style="font-weight: 500; color: #555;">当前密码</label>
                            <input type="password" class="form-control" id="oldPassword" placeholder="请输入当前密码" required style="border-radius: 8px; padding: 10px 15px; border: 2px solid #e1e5e9;">
                        </div>

                        <div class="mb-3">
                            <label for="newPassword" class="form-label" style="font-weight: 500; color: #555;">新密码</label>
                            <input type="password" class="form-control" id="newPassword" placeholder="请输入新密码（至少6位）" required minlength="6" style="border-radius: 8px; padding: 10px 15px; border: 2px solid #e1e5e9;">
                            <div style="color: #7f8c8d; font-size: 14px; margin-top: 5px;">密码长度不能少于6位</div>
                        </div>

                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label" style="font-weight: 500; color: #555;">确认新密码</label>
                            <input type="password" class="form-control" id="confirmPassword" placeholder="请再次输入新密码" required style="border-radius: 8px; padding: 10px 15px; border: 2px solid #e1e5e9;">
                        </div>

                        <button type="submit" class="btn btn-primary" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 8px; padding: 10px 30px; color: white; font-weight: 600;">
                            <i class="bi bi-key"></i> 修改密码
                        </button>
                    </form>
                </div>
            </div>
        </div>


    </div>

    <!-- Create/Edit Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增用户</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label for="userNickName">昵称</label>
                    <input type="text" id="userNickName">
                </div>
                <div class="form-group" id="passwordGroup">
                    <label for="userPassword">密码 *</label>
                    <input type="password" id="userPassword">
                </div>
                <div class="form-group">
                    <label for="userEmail">邮箱</label>
                    <input type="email" id="userEmail">
                </div>
                <div class="form-group">
                    <label for="userMobile">手机号</label>
                    <input type="text" id="userMobile">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    

    <!-- Bootstrap JS -->
    <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Alert Overlay -->
    <div id="customAlertOverlay" class="custom-alert-overlay">
        <div class="custom-alert-box">
            <div id="customAlertMessage" class="custom-alert-message"></div>
            <div class="custom-alert-buttons">
                <button id="customAlertCancelBtn" class="custom-alert-btn custom-alert-btn-cancel" style="display: none;">取消</button>
                <button id="customAlertOkBtn" class="custom-alert-btn custom-alert-btn-ok">确定</button>
            </div>
        </div>
    </div>
    
    <!-- Custom JS -->
    <script src="/js/index.js"></script>
</body>
</html>
